version: '3.8'

services:
  # Nginx Reverse Proxy + SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - envoy-network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # Frontend (Next.js/React/Vue)
  frontend:
    build: ./frontend
    working_dir: /app
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - envoy-network

  # API (Node.js/Express)
  api:
    build: ./api
    working_dir: /app
    env_file:
      - ./api/.env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - envoy-network

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-envoydb}
      - POSTGRES_USER=${POSTGRES_USER:-envoy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=10485kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_connections=200
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-envoy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - envoy-network

  # Redis
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - envoy-network

  # Real-time WebSocket Server
  realtime:
    build: ./realtime
    working_dir: /app
    env_file:
      - ./realtime/.env
    ports:
      - "4001:4001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - envoy-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  envoy-network:
    driver: bridge
